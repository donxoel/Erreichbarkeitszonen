        var pinCoords = [
            {lat: 49.215291, lng: 9.411893, label: "Schulstraße 54, Langenbrettach"},
            {lat: 49.216343, lng: 9.217443, label: "Lange Straße 48, Bad Friedrichshall"},
            {lat: 49.22761,  lng: 9.382635, label: "Brennofenstraße 32, Langenbrettach"},
            {lat: 49.216343, lng: 9.217443, label: "Lange Straße 48, Bad Friedrichshall"}
        ];
        var markers = [];
        var overlayMaps = {};
        var layerNames = ['GS Langenbeutingen', 'BFH 20min', 'GS Brettach', 'BFH 30min'];

        geojsons.forEach(function(geoData, index) {
            // Sort features: largest zones first so inner zones render on top
            if (geoData.features) {
                geoData.features.sort(function(a, b) {
                    return b.properties.value - a.properties.value;
                });
            }
            var layer = L.geoJSON(geoData, {
                style: function(feature) {
                    var value = feature.properties.value;
                    return {
                        fillColor: getColor(value, index),
                        weight: 2,
                        opacity: 0.8,
                        color: 'white',
                        dashArray: '5, 5',
                        fillOpacity: 0.30
                    };
                },
                onEachFeature: function(feature, layer) {
                    layer.bindPopup(`
                        <b>Zone ${feature.properties.value}m</b><br>
                        Bevölkerung: ${feature.properties.total_pop.toLocaleString()}<br>
                        Fläche: ${(feature.properties.area/1000000).toFixed(2)} km²<br>
                        Reachfactor: ${feature.properties.reachfactor.toFixed(3)}<br>
                        Center: ${feature.properties.center[0].toFixed(4)}, ${feature.properties.center[1].toFixed(4)}
                    `);
                }
            });
            var marker = L.marker([pinCoords[index].lat, pinCoords[index].lng])
                .bindPopup('<b>' + layerNames[index] + '</b><br>' + pinCoords[index].label);
            markers.push(marker);

            // Toggle marker together with layer
            layer.on('add', function() { marker.addTo(map); });
            layer.on('remove', function() { marker.remove(); });

            overlayMaps[layerNames[index]] = layer;
            if (index === 3 || index === 2) {
                layer.addTo(map);
                marker.addTo(map);
            }
        });

        // Custom styled layer control
        var CustomControl = L.Control.extend({
            options: { position: 'topright' },
            onAdd: function(map) {
                var div = L.DomUtil.create('div', 'custom-layer-control');
                var colors = ['#1a9641','#1a9641','#1a9641','#1a9641'];
                var rows = '';
                layerNames.forEach(function(name, i) {
                    var checked = (i === 3 || i === 2) ? 'checked' : '';
                    rows += '<label class="clc-row">'
                          + '<input type="checkbox" ' + checked + ' data-index="' + i + '">'
                          + '<span class="clc-dot" style="background:' + colors[i] + '"></span>'
                          + '<span class="clc-name">' + name + '</span>'
                          + '</label>';
                });
                div.innerHTML = '<div class="clc-header" id="clc-header">'
                              + '<span class="clc-title">&#128506; Erreichbarkeitszonen</span>'
                              + '<span class="clc-toggle" id="clc-toggle">&#9660;</span>'
                              + '</div>'
                              + '<div class="clc-body" id="clc-body">' + rows + '</div>';
                L.DomEvent.disableClickPropagation(div);
                L.DomEvent.disableScrollPropagation(div);
                return div;
            }
        });
        new CustomControl().addTo(map);

        // Wire up checkboxes
        document.addEventListener('change', function(e) {
            if (e.target && e.target.matches('.custom-layer-control input[type=checkbox]')) {
                var i = parseInt(e.target.getAttribute('data-index'));
                var layer = overlayMaps[layerNames[i]];
                if (e.target.checked) {
                    layer.addTo(map);
                } else {
                    map.removeLayer(layer);
                }
            }
        });

        // Farbfunktion
        function getColor(value, layerIndex) {
            // For layer 3 (3 zones: 600,1200,1800): normalize to full green->red spectrum
            if (layerIndex === 3) {
                switch(value) {
                    case 600:  return '#1a9641';  // Grün (innerste)
                    case 1200: return '#fee08b';  // Gelb-Orange (mitte)
                    case 1800: return '#a50026';  // Dunkelrot (äußerste)
                    default:   return '#a50026';
                }
            }
            // For layers 0-2 (4 zones: 300,600,900,1200)
            switch(value) {
                case 300:  return '#1a9641';  // Grün
                case 600:  return '#91cf60';  // Hellgrün
                case 900:  return '#fee08b';  // Gelb-Orange
                case 1200: return '#a50026';  // Dunkelrot (äußerste bei 4-Zonen)
                default:   return '#a50026';
            }
        }

        // Toggle collapse
        document.addEventListener('click', function(e) {
            var header = document.getElementById('clc-header');
            if (header && header.contains(e.target)) {
                var body = document.getElementById('clc-body');
                var toggle = document.getElementById('clc-toggle');
                body.classList.toggle('collapsed');
                toggle.classList.toggle('collapsed');
            }
        });

        // Automatisches Fit zu allen Zonen
        map.fitBounds(L.geoJSON(geojsons[0]).getBounds().pad(0.1));
    </script>
